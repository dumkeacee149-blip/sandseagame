<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Sandsea Privateers — Voxel Desert Pirate Trading Adventure</title>
    <meta
      name="description"
      content="Sail a voxel sand sea: trade between oasis ports, upgrade your skiff, outrun the leviathan, and claim the relic vault. A browser game — no download."
    />
    <meta property="og:title" content="Sandsea Privateers" />
    <meta
      property="og:description"
      content="Sail a voxel sand sea: trade, upgrade, outrun the leviathan, claim the relic vault."
    />
    <meta property="og:type" content="website" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <script>
      // 官网优先：首次访问先看落地页，从官网 Play(?play=1) 或回头客直接进游戏。
      // Playwright（webdriver）与带 presence 参数的多人测试直连不拦。
      (function () {
        try {
          var KEY = "sandsea-seen-landing";
          var params = new URLSearchParams(location.search);
          if (navigator.webdriver || params.has("presence")) return;
          if (params.has("play")) {
            localStorage.setItem(KEY, "1");
            return;
          }
          if (!localStorage.getItem(KEY)) {
            location.replace("/landing.html");
          }
        } catch (e) {
          // localStorage 不可用时不守门，直接进游戏
        }
      })();
    </script>
    <style>
      /* 首屏 Loading：内联样式保证 HTML 一到即显示（three 包体在慢链路可能要几秒） */
      #boot-overlay {
        position: fixed;
        inset: 0;
        z-index: 99;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        background: linear-gradient(172deg, #3a2817, #241708);
        color: #f6ecd2;
        font-family: Georgia, serif;
        transition: opacity 0.4s ease;
      }
      #boot-overlay h2 {
        margin: 0;
        font-size: 1.6rem;
        letter-spacing: 0.06em;
        color: #ecc06a;
      }
      #boot-overlay p {
        margin: 0;
        font-size: 0.85rem;
        opacity: 0.65;
        animation: boot-breathe 1.6s ease-in-out infinite;
      }
      @keyframes boot-breathe {
        50% {
          opacity: 0.3;
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-overlay">
      <h2>Sandsea Privateers</h2>
      <p data-i18n="boot.loading">Charting the sandsea…</p>
    </div>
    <canvas id="game"></canvas>
    <div class="trial-note" data-i18n="trial.note">Playtest build · all progress will be wiped before launch</div>
    <button id="lang-toggle" class="lang-toggle" type="button" aria-label="切换语言 / Switch language">中文</button>
    <main class="hud" aria-label="Sandsea privateers status">
      <section class="brand-strip">
        <div class="brand-title">
          <p class="eyebrow">Sandsea Privateers</p>
          <h1>Dune Corsair</h1>
        </div>
        <div class="stat-grid">
          <span class="stat-chip"
            ><i><svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8.5 1 L8.5 11 L2.5 11 Q4 6.5 8.5 1 Z" /><path d="M10 4 L10 11 L13.5 11 Q12.8 7.5 10 4 Z" opacity="0.7" /><path d="M1.5 12.5 L14.5 12.5 L13 14.5 L3 14.5 Z" /></svg></i
            ><b id="speed">0</b><em data-i18n="hud.knots">knots</em></span
          >
          <span class="stat-chip stat-gold"
            ><i><svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><circle cx="8" cy="8" r="6.5" /><circle cx="8" cy="8" r="4" fill="var(--wood-deep)" /><path d="M8 5.2 L8.8 7.4 L11 7.4 L9.2 8.9 L9.9 11 L8 9.7 L6.1 11 L6.8 8.9 L5 7.4 L7.2 7.4 Z" /></svg></i
            ><b id="gold">0</b><em data-i18n="hud.gold">gold</em></span
          >
          <span class="stat-chip"
            ><i><svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><rect x="2" y="3" width="12" height="10" rx="1" /><rect x="2" y="7" width="12" height="2" fill="var(--wood-deep)" /><rect x="7" y="3" width="2" height="10" fill="var(--wood-deep)" opacity="0.6" /></svg></i
            ><b id="cargo">0/8</b><em data-i18n="hud.cargo">cargo</em></span
          >
          <span class="stat-chip stat-hull"
            ><i><svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 14 C3 10.2 1.5 7.6 1.5 5.4 C1.5 3.4 3 2 4.8 2 C6 2 7.2 2.7 8 3.8 C8.8 2.7 10 2 11.2 2 C13 2 14.5 3.4 14.5 5.4 C14.5 7.6 13 10.2 8 14 Z" /></svg></i
            ><b id="hull">100</b><em data-i18n="hud.hull">hull</em></span
          >
          <span class="stat-chip stat-php" id="php-chip" hidden
            ><i><svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M7 1 H9 V7 H15 V9 H9 V15 H7 V9 H1 V7 H7 Z" /></svg></i
            ><b id="php">60</b><em>HP</em></span
          >
        </div>
      </section>
      <section class="route-chip">
        <span class="route-dot"></span>
        <span id="route">Open Sandsea</span>
      </section>
    </main>
    <div id="action" class="action-chip" role="status"></div>
    <canvas id="minimap" class="minimap" width="168" height="168" aria-label="Minimap"></canvas>
    <div id="chat" class="chat-panel">
      <p class="chat-badge">⚓ <span data-i18n="chat.band">Harbor Band</span> · <span class="chat-local" data-i18n="chat.local">LOCAL</span></p>
      <ul id="chat-log"></ul>
      <input id="chat-input" maxlength="120" placeholder="Say something, Captain… (Enter)" data-i18n-placeholder="chat.placeholder" hidden autocomplete="off" />
    </div>
    <!-- 快捷键条内容由 ui/controls-hint.ts 按模式渲染（图标 + 键帽） -->
    <div class="controls-hint" id="controls-hint"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
